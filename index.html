<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Lexico">
<title>Lexico</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:       #ffffff;
    --surface:  #f5f5f5;
    --border:   #e0e0e0;
    --text:     #111111;
    --muted:    #666666;
    --accent:   #1a56db;
    --accent-bg:#eef2ff;
    --tag-bg:   #eef2ff;
    --tag-text: #1a40a8;
    --radius:   10px;
    --ff:       -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:       #111111;
      --surface:  #1e1e1e;
      --border:   #2e2e2e;
      --text:     #f0f0f0;
      --muted:    #999999;
      --accent:   #6b9eff;
      --accent-bg:#1a2340;
      --tag-bg:   #1a2340;
      --tag-text: #7baeff;
    }
  }
  html, body { height: 100%; }
  body {
    font-family: var(--ff);
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
  }

  /* Splash */
  #splash {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 20px; z-index: 100;
    transition: opacity 0.3s ease;
  }
  #splash.hidden { opacity: 0; pointer-events: none; }
  #splash h2 { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }
  #splash p  { font-size: 14px; color: var(--muted); }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Ready badge */
  #status-badge {
    position: fixed; top: 14px; right: 16px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.4px;
    padding: 4px 10px; border-radius: 20px;
    opacity: 0; transition: opacity 0.3s;
    pointer-events: none; z-index: 50;
    background: #d1fae5; color: #065f46;
  }
  #status-badge.show { opacity: 1; }
  @media (prefers-color-scheme: dark) {
    #status-badge { background: #064e3b; color: #6ee7b7; }
  }

  /* Header */
  header {
    padding: 14px 16px 10px; background: var(--bg);
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 10px; }
  .search-wrap { position: relative; }
  .search-wrap svg {
    position: absolute; left: 10px; top: 50%;
    transform: translateY(-50%); color: var(--muted); pointer-events: none;
  }
  #search {
    width: 100%; padding: 9px 12px 9px 36px; font-size: 16px;
    border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--surface); color: var(--text);
    outline: none; -webkit-appearance: none;
  }
  #search:focus { border-color: var(--accent); background: var(--bg); }
  #count { margin-top: 8px; font-size: 12px; color: var(--muted); min-height: 16px; }

  /* Layout */
  .layout { display: flex; flex: 1; overflow: hidden; }
  #list {
    width: 140px; flex-shrink: 0; overflow-y: auto;
    border-right: 1px solid var(--border); -webkit-overflow-scrolling: touch;
  }
  .word-item {
    padding: 9px 12px; font-size: 14px; cursor: pointer;
    border-bottom: 1px solid var(--border); color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .word-item:active { background: var(--surface); }
  .word-item.selected { background: var(--accent-bg); color: var(--accent); font-weight: 600; }

  .hint {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100%; gap: 10px;
    color: var(--muted); font-size: 14px; text-align: center; padding: 24px;
  }
  .hint svg { opacity: 0.25; }

  #detail {
    flex: 1; overflow-y: auto; padding: 20px 16px 32px;
    -webkit-overflow-scrolling: touch;
  }
  .word-title { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 16px; }
  .sense { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
  .sense:last-child { border-bottom: none; margin-bottom: 0; }
  .pos-tag {
    display: inline-block; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.6px;
    padding: 2px 8px; border-radius: 20px;
    background: var(--tag-bg); color: var(--tag-text); margin-bottom: 8px;
  }
  .definition { font-size: 15px; line-height: 1.6; margin-bottom: 8px; }
  .example {
    font-size: 14px; line-height: 1.6; color: var(--muted);
    font-style: italic; padding-left: 12px; border-left: 3px solid var(--border);
  }

  /* Mobile: single panel */
  @media (max-width: 480px) {
    #list { width: 100%; border-right: none; }
    #detail {
      display: none; position: fixed; inset: 0; z-index: 10;
      background: var(--bg); padding: 16px 16px 40px;
    }
    #detail.visible { display: block; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 15px; color: var(--accent); margin-bottom: 16px;
      cursor: pointer; background: none; border: none; padding: 0;
      font-family: var(--ff);
    }
  }
  @media (min-width: 481px) { .back-btn { display: none; } }
</style>
</head>
<body>

<div id="splash">
  <div class="spinner"></div>
  <h2>Lexico</h2>
  <p id="splash-msg">Loading word list…</p>
</div>

<div id="status-badge"></div>

<header>
  <h1>Lexico</h1>
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="search" type="search" placeholder="Type a word…" autocomplete="off"
           autocorrect="off" autocapitalize="off" spellcheck="false" aria-label="Search">
  </div>
  <div id="count" aria-live="polite"></div>
</header>

<div class="layout">
  <div id="list" role="listbox" aria-label="Word suggestions">
    <div class="hint">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <span>Start typing to search</span>
    </div>
  </div>
  <div id="detail" role="region" aria-label="Definition">
    <div class="hint">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
      <span>Select a word to see its definition</span>
    </div>
  </div>
</div>

<script>
const GITHUB_RAW = "https://raw.githubusercontent.com/wordset/wordset-dictionary/master/data";

const searchEl  = document.getElementById("search");
const listEl    = document.getElementById("list");
const detailEl  = document.getElementById("detail");
const countEl   = document.getElementById("count");
const splash    = document.getElementById("splash");
const splashMsg = document.getElementById("splash-msg");
const badge     = document.getElementById("status-badge");

const MAX_SUGGESTIONS = 50;
let WORDS = [];
let filtered = [];
let selectedIndex = -1;
const ghCache = {};  // letter → parsed JSON, cached after first fetch

// ── Status badge ─────────────────────────────────────────────────────────
function showBadge(text) {
  badge.textContent = text;
  badge.classList.add("show");
}

// ── Splash ────────────────────────────────────────────────────────────────
function dismissSplash() {
  splash.classList.add("hidden");
  setTimeout(() => splash.remove(), 300);
}

// ── Init: fetch word list only (one small index file) ────────────────────
async function init() {
  try {
    // Fetch all 27 letter files in parallel — but only extract word keys,
    // not definitions. Definitions are fetched lazily on word tap.
    const letters = "abcdefghijklmnopqrstuvwxyz#".split("");
    const results = await Promise.allSettled(
      letters.map(l => fetch(`${GITHUB_RAW}/${l}.json`).then(r => r.json()))
    );

    const allWords = [];
    results.forEach((r, i) => {
      if (r.status === "fulfilled") {
        ghCache[letters[i]] = r.value;  // cache full chunk — already fetched
        Object.keys(r.value).forEach(w => allWords.push(w.trim()));
      }
    });

    allWords.sort((a, b) => a.toLowerCase().localeCompare(b.toLowerCase()));
    WORDS = allWords;
    showBadge("✓ Ready");

  } catch (e) {
    // no badge on failure
    WORDS = [];
  }

  dismissSplash();
  countEl.textContent = WORDS.length
    ? `${WORDS.length.toLocaleString()} words ready`
    : "Could not load word list. Check your connection.";
  searchEl.focus();
}

// ── Definition lookup — uses cache, no repeat fetches ────────────────────
async function getSenses(word) {
  const firstChar = word[0].toLowerCase();
  const letter = /[a-z]/.test(firstChar) ? firstChar : "#";

  if (!ghCache[letter]) {
    try {
      const r = await fetch(`${GITHUB_RAW}/${letter}.json`);
      ghCache[letter] = await r.json();
    } catch (e) {
      return null; // null = network error
    }
  }

  const entry = ghCache[letter][word];
  if (!entry) return [];
  return (entry.meanings || [])
    .filter(m => m.def)
    .map(m => ({ p: m.speech_part || "", d: m.def, e: m.example || "" }));
}

// ── Helpers ───────────────────────────────────────────────────────────────
function posLabel(p) {
  const map = {
    noun:"noun", verb:"verb", adjective:"adj.", adverb:"adv.",
    pronoun:"pron.", preposition:"prep.", conjunction:"conj.",
    interjection:"interj.", article:"article", abbreviation:"abbr.",
  };
  return map[p] || p || "word";
}
function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

const EMPTY_DETAIL_HTML = `<div class="hint">
  <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
  </svg>
  <span>Select a word to see its definition</span>
</div>`;

// ── Render word list ──────────────────────────────────────────────────────
function renderList() {
  const shown = filtered.slice(0, MAX_SUGGESTIONS);
  const frag  = document.createDocumentFragment();
  shown.forEach((word, i) => {
    const div = document.createElement("div");
    div.className = "word-item" + (i === selectedIndex ? " selected" : "");
    div.setAttribute("role", "option");
    div.setAttribute("aria-selected", i === selectedIndex);
    div.textContent = word;
    div.addEventListener("click", () => selectWord(i));
    frag.appendChild(div);
  });
  listEl.innerHTML = "";
  listEl.appendChild(frag);

  if (filtered.length === 0) {
    countEl.textContent = "No matches found";
  } else if (filtered.length > MAX_SUGGESTIONS) {
    countEl.textContent = `Showing 50 of ${filtered.length.toLocaleString()} — keep typing`;
  } else {
    countEl.textContent = `${filtered.length} match${filtered.length === 1 ? "" : "es"}`;
  }
}

// ── Select & show definition ──────────────────────────────────────────────
async function selectWord(i) {
  selectedIndex = i;
  const word = filtered[i];

  listEl.querySelectorAll(".word-item").forEach((el, idx) => {
    el.classList.toggle("selected", idx === i);
    el.setAttribute("aria-selected", idx === i);
  });

  detailEl.innerHTML = `<button class="back-btn" onclick="closeDetail()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    Back
  </button>
  <div class="word-title">${escHtml(word)}</div>
  <div class="hint" style="height:auto;padding:20px 0"><div class="spinner"></div></div>`;
  detailEl.classList.add("visible");
  detailEl.scrollTop = 0;

  const senses = await getSenses(word);

  let html = `<button class="back-btn" onclick="closeDetail()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    Back
  </button>
  <div class="word-title">${escHtml(word)}</div>`;

  if (senses === null) {
    html += `<p class="definition" style="color:var(--muted)">Could not load definition. Check your connection.</p>`;
  } else if (senses.length === 0) {
    html += `<p class="definition" style="color:var(--muted)">No definition available.</p>`;
  } else {
    senses.forEach(s => {
      html += `<div class="sense">`;
      if (s.p) html += `<span class="pos-tag">${escHtml(posLabel(s.p))}</span>`;
      html += `<div class="definition">${escHtml(s.d)}</div>`;
      if (s.e) html += `<div class="example">"${escHtml(s.e)}"</div>`;
      html += `</div>`;
    });
  }

  detailEl.innerHTML = html;
  detailEl.scrollTop = 0;
}

function closeDetail() {
  detailEl.classList.remove("visible");
  detailEl.innerHTML = EMPTY_DETAIL_HTML;
  selectedIndex = -1;
}

// ── Search ────────────────────────────────────────────────────────────────
function onSearch() {
  const q = searchEl.value.trim().toLowerCase();
  selectedIndex = -1;

  if (!q) {
    filtered = [];
    listEl.innerHTML = `<div class="hint">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg><span>Start typing to search</span></div>`;
    countEl.textContent = `${WORDS.length.toLocaleString()} words ready`;
    detailEl.innerHTML = EMPTY_DETAIL_HTML;
    detailEl.classList.remove("visible");
    return;
  }

  const prefix = WORDS.filter(w => w.toLowerCase().startsWith(q));
  filtered = prefix.length > 0 ? prefix : WORDS.filter(w => w.toLowerCase().includes(q));
  renderList();

  const exact = filtered.findIndex(w => w.toLowerCase() === q);
  if (exact !== -1) {
    selectWord(exact);
  } else {
    detailEl.classList.remove("visible");
    detailEl.innerHTML = EMPTY_DETAIL_HTML;
  }
}

searchEl.addEventListener("input", onSearch);

searchEl.addEventListener("keydown", e => {
  const items = listEl.querySelectorAll(".word-item");
  if (e.key === "ArrowDown") {
    e.preventDefault();
    const next = Math.min(selectedIndex + 1, Math.min(filtered.length, MAX_SUGGESTIONS) - 1);
    selectWord(next); items[next]?.scrollIntoView({block:"nearest"});
  } else if (e.key === "ArrowUp") {
    e.preventDefault();
    const prev = Math.max(selectedIndex - 1, 0);
    selectWord(prev); items[prev]?.scrollIntoView({block:"nearest"});
  } else if (e.key === "Enter" && selectedIndex >= 0) {
    items[selectedIndex]?.click();
  }
});

// no connectivity events needed

init();
</script>
</body>
</html>
